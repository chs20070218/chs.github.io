<!DOCTYPE html>
<html lang="zh-CN">
<head>

</head>
<body>
    <header id="header">
        <div class="logo">
            < img src="img/img1.jpg" alt="网站Logo">

        <nav class="nav-menu">
            <ul>
                <li><a href=" ">首页</a ></li>

    <div class="container">
        <aside class="left-bar">
            <h3>图书分类</h3>
            <ul>
                <li><a href="#">文学小说</a ></li>
                <li><a href="#">科技计算机</a ></li>

            <section class="book-show">
                <h3>图书展示</h3>
                <div class="book-list">

                </div>
                <div style="clear: both;"></div>
            </section>
            <section class="hot-recommend">
                <h3>热门推荐</h3>
                <div class="hot-list">
                    <div class="hot-item">畅销图书1</div>
                    <div class="hot-item">畅销图书2</div>

            </section>
            <section class="new-book">
                <h3>新书上市</h3>
                <table border="1" cellpadding="10" cellspacing="0">
                    <tr>
                        <th>书名</th>
                        <th>作者</th>
                        <th>价格</th>
                    </tr>
                    <tr>
                        <td>《Web前端开发》</td>
                        <td>XXX</td>
                        <td>¥49.9</td>
                    </tr>
                </table>
            </section>

        <aside class="right-bar">
            <h3>促销信息</h3>
            <p>满99减20</p >
            <p>新书8折</p >
        </aside>
        <div style="clear: both;"></div>
