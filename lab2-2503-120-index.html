<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>数字展销平台-春韵</title>
    <!-- 引入CSS样式文件 -->
    <link rel="stylesheet" href="CSS/lab2-2503-120-index.css">
</head>
<body>
    <header id="header">
        <div class="logo">
              
             <p>《线上网站》</p>
        </div>
        <nav class="nav-menu">
            <ul>
                <li><a href="#">首页</a></li>
                <li><a href="#">图书分类</a></li>
                <li><a href="#">热门推荐</a></li>
                <li><a href="#">新书上市</a></li>
            </ul>
        </nav>
        <div style="clear: both;"></div>
    </header>
    <div class="container">
        <aside class="left-bar">
            <h3>图书分类</h3>
            <ul>
                <li><a href="#">术数</a></li>
                <li><a href="#">科技计算机</a></li>
                <li><a href="#">物理学</a></li>
            </ul>
        </aside>
        <main class="main-content">
            <section class="book-show">
                <h3>图书展示</h3>
                <div class="book-list">
                    <div class="book-item hover-item">
                        <img src="img/img1.jpg" alt="图书">
                        <p>《高数》</p>
                       
                    </div>
                    <div class="book-item hover-item">
                        <img src="img/img2.jpg" alt="图书">
                        <p>《网页设计基础与实践》</p>
                        
                    </div>
                    <div class="book-item">
                        <img src="img/img3.jpg" alt="图书">
                        <p>《大学物理学》</p>
                    </div>
                </div>
                <div style="clear: both;"></div>
            </section>
            <section class="hot-recommend">
                <h3>热门推荐</h3>
                <div class="hot-list">
                    <div class="hot-item">畅销图书1</div>
                    <div class="hot-item">畅销图书2</div>
                    <div class="hot-item">畅销图书3</div>
                </div>
                <div style="clear: both;"></div>
            </section>
            <section class="new-book">
                <h3>新书上市</h3>
                <table border="1" cellpadding="10" cellspacing="0">
                    <tr>
                        <th>书名</th>
                        <th>作者</th>
                        <th>价格</th>
                    </tr>
                    <tr>
                        <td>《高数》</td>
                        <td>冯本熠</td>
                        <td>¥19.9</td>
                    </tr>
                    <tr>
                        <td>《网页设计基础与实践》</td>
                        <td>陈德睿</td>
                        <td>¥39.9</td>
                    </tr>
                    <tr>
                        <td>《大学物理学》</td>
                        <td>褚红赛</td>
                        <td>¥59.9</td>
                    </tr>
                </table>
            </section>
        </main>
        <aside class="right-bar">
            <h3>促销信息</h3>
            <p>满99减20</p>
            <p>新书8折</p>
        </aside>
        <div style="clear: both;"></div>
    </div>
</body>
</html>
